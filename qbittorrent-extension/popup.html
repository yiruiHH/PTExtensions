<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>qBittorrent Sender Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      width: 340px;
      padding: 20px;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #89b4fa;
    }
    label {
      display: block;
      font-size: 12px;
      color: #a6adc8;
      margin-bottom: 4px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 12px;
      border: 1px solid #45475a;
      border-radius: 6px;
      background: #313244;
      color: #cdd6f4;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #89b4fa; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #89b4fa;
      color: #1e1e2e;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    .success { color: #a6e3a1; }
    .error { color: #f38ba8; }
  </style>
</head>
<body>
  <h2>qBittorrent Settings</h2>

  <label for="qbUrl">qBittorrent Web UI URL</label>
  <input type="text" id="qbUrl" placeholder="http://192.168.0.120:30024">

  <label for="username">Username</label>
  <input type="text" id="username" placeholder="admin">

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="password">

  <label for="savePath">Default Save Path</label>
  <input type="text" id="savePath" placeholder="/downloads">

  <button id="btnSave">Save Settings</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
